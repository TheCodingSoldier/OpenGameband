<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGameband Web USB</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="app">
    <h1>OpenGameband Web USB</h1>
    <p class="subtitle">Connect to Gameband from your browser without installing the desktop app.</p>

    <section class="card">
        <h2>Connection</h2>
        <div class="actions">
            <button id="connectButton" type="button">Connect</button>
            <button id="disconnectButton" type="button">Disconnect</button>
        </div>
        <p id="status" class="status">Status: Not connected</p>
    </section>

    <section class="card">
        <h2>Send Hex Payload</h2>
        <label for="payloadInput">Hex bytes (example: <code>01 02 aa ff</code>)</label>
        <input id="payloadInput" type="text" placeholder="01 02 aa ff">
        <button id="sendButton" type="button">Send</button>
    </section>

    <section class="card">
        <h2>Read Response</h2>
        <div class="actions">
            <button id="readButton" type="button">Read Once</button>
            <button id="clearLogButton" type="button">Clear Log</button>
        </div>
        <pre id="log" class="log" aria-live="polite"></pre>
    </section>
</main>
<script src="app.js"></script>
</body>
</html>
